# ┌──────────────────────────────────────────────────────────────────────────┐
# │  Reusable test workflow — UBT build + UE Automation specs for ONE UE      │
# │  version, on a SELF-HOSTED Windows UE runner. Analog of Unity-AI-*'s        │
# │  test_unity_plugin.yml. Called by test_pull_request.yml + release.yml.      │
# │  Licensed under the Apache License, Version 2.0.                            │
# └──────────────────────────────────────────────────────────────────────────┘
#
# NEVER red-by-absence: the job is gated on `vars.UNREAL_RUNNER_READY == 'true'`.
# While that variable is unset (no self-hosted UE runner registered), the job is
# SKIPPED — a skipped job does not fail the PR. Once the owner registers a runner
# with both target UE versions installed they set UNREAL_RUNNER_READY=true and the
# leg becomes a live required-when-available check (mirrors Unreal-MCP core).
#
# Required repository configuration before enabling:
#   vars.UNREAL_RUNNER_READY = 'true'
#   vars.UNREAL_HOST_PROJECT = absolute path on the runner to a host .uproject that
#     has the UnrealMCP core plugin available (its Plugins/UnrealMCP junctions to a
#     UnrealMCP checkout/package). This workflow junctions THIS extension into the
#     same host's Plugins/ and builds the host editor target so the specs compile in.
name: test-unreal-plugin

on:
  workflow_dispatch:
    inputs:
      ue: { description: "UE version (e.g. 5.7)", required: true, type: string }
  workflow_call:
    inputs:
      ue: { required: true, type: string }

permissions:
  contents: read

jobs:
  build-and-test:
    name: UE ${{ inputs.ue }} host build + Automation
    # Gated on the runner being registered AND (for PRs) the PR originating from THIS
    # repo, never a fork (a fork PR must never run its checked-out code on a self-hosted
    # runner). Manual dispatches are trusted and unaffected by the fork clause.
    if: ${{ vars.UNREAL_RUNNER_READY == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: [self-hosted, windows, unreal]
    env:
      UE_ROOT: C:\Program Files\Epic Games\UE_${{ inputs.ue }}
      HOST_UPROJECT: ${{ vars.UNREAL_HOST_PROJECT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Resolve plugin + module name
        id: meta
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $uplugin = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -Filter '*.uplugin' |
            Where-Object { $_.FullName -notmatch '[\\/](Binaries|Intermediate|Saved)[\\/]' } | Select-Object -First 1
          if (-not $uplugin) { throw "No .uplugin found in the checkout." }
          $module = [System.IO.Path]::GetFileNameWithoutExtension($uplugin.Name)
          echo "plugin_dir=$($uplugin.Directory.FullName)" >> $env:GITHUB_OUTPUT
          echo "module=$module" >> $env:GITHUB_OUTPUT
          echo "Resolved plugin '$module' at $($uplugin.Directory.FullName)"

      # ── Self-heal the host's UnrealMCP plugin BEFORE UBT reads the makefile ──────
      # The host .uproject requires the UnrealMCP core plugin (enabled). Its
      # Plugins\UnrealMCP is a junction that, by the core CI's convention, points at the
      # per-run BuildPlugin output under $RUNNER_TEMP\UnrealMCP-Package — an EPHEMERAL
      # location that GitHub Actions clears at job teardown. When it is cleared (or this
      # job lands on a self-hosted runner where core CI never ran), the junction dangles
      # and UBT fails makefile generation in ~4s with "Unable to find plugin 'UnrealMCP'"
      # (Result: Failed (OtherCompilationError)) BEFORE any extension code compiles.
      # This step GUARANTEES a valid UnrealMCP source is junctioned in, independent of
      # core CI timing / which runner we land on. Mirrors the core Unreal-MCP CI
      # self-heal (test_pull_request.yml, PR #185). MUST hard-fail if it cannot make the
      # junction valid — a silent failure would just red the build later with the same
      # confusing makefile error.
      - name: Self-heal host UnrealMCP plugin junction
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ([string]::IsNullOrWhiteSpace($env:HOST_UPROJECT)) {
            throw "UNREAL_HOST_PROJECT repo variable is not set — the host build needs a host .uproject with the UnrealMCP plugin enabled."
          }
          $hostPlugins = Join-Path (Split-Path -Parent $env:HOST_UPROJECT) 'Plugins'
          New-Item -ItemType Directory -Force -Path $hostPlugins | Out-Null
          $mcpLink = Join-Path $hostPlugins 'UnrealMCP'

          function Test-McpSource([string]$dir) {
            return (-not [string]::IsNullOrWhiteSpace($dir)) -and (Test-Path -LiteralPath (Join-Path $dir 'UnrealMCP.uplugin'))
          }

          # Preference 1: a fresh core BuildPlugin package left in THIS runner's RUNNER_TEMP
          # (present only right after a core CI run on the same runner — matches core's convention).
          $mcpSource = $null
          $freshPackage = Join-Path $env:RUNNER_TEMP 'UnrealMCP-Package'
          if (Test-McpSource $freshPackage) {
            $mcpSource = $freshPackage
            Write-Host "UnrealMCP source: fresh core BuildPlugin package -> $mcpSource"
          } else {
            # Preference 2: a STABLE clone of the public core repo kept next to the host project
            # (persists across jobs/runners on this machine; refreshed to the core default branch,
            # which the extensions track — they pin no specific UnrealMCP version). UBT compiles the
            # plugin from source as part of the host editor target build, so raw source is sufficient.
            $srcRoot   = Join-Path (Split-Path -Parent (Split-Path -Parent $env:HOST_UPROJECT)) 'UnrealMCP-src'
            $repoDir   = Join-Path $srcRoot 'Unreal-MCP'
            $pluginDir = Join-Path $repoDir 'UnrealMCP'
            $repoUrl   = 'https://github.com/IvanMurzak/Unreal-MCP.git'
            if (Test-McpSource $pluginDir) {
              Write-Host "Refreshing stable UnrealMCP clone at $repoDir (core default branch)"
              try {
                git -C "$repoDir" fetch --depth 1 origin HEAD 2>&1 | Write-Host
                git -C "$repoDir" reset --hard FETCH_HEAD 2>&1 | Write-Host
              } catch {
                Write-Host "WARN: refresh failed ($($_.Exception.Message)); reusing the existing clone."
              }
            } else {
              Write-Host "Cloning stable UnrealMCP source into $repoDir (core default branch)"
              if (Test-Path -LiteralPath $repoDir) { cmd /c rmdir /s /q "$repoDir" 2>$null }
              New-Item -ItemType Directory -Force -Path $srcRoot | Out-Null
              git clone --depth 1 "$repoUrl" "$repoDir" 2>&1 | Write-Host
              if ($LASTEXITCODE -ne 0) { throw "Failed to clone $repoUrl (exit $LASTEXITCODE)." }
            }
            if (-not (Test-McpSource $pluginDir)) {
              throw "Stable UnrealMCP clone is invalid — no UnrealMCP.uplugin under $pluginDir."
            }
            $mcpSource = $pluginDir
            Write-Host "UnrealMCP source: stable clone -> $mcpSource"
          }

          # (Re)create the host Plugins\UnrealMCP junction idempotently: drop any existing
          # reparse point / dir first (unlink only — never recurse into the target), then mklink /J.
          if (Test-Path -LiteralPath $mcpLink) {
            cmd /c rmdir "$mcpLink" 2>$null
            if (Test-Path -LiteralPath $mcpLink) { Remove-Item -LiteralPath $mcpLink -Recurse -Force }
          }
          cmd /c mklink /J "$mcpLink" "$mcpSource" | Write-Host
          if ($LASTEXITCODE -ne 0) { throw "Failed to (re)create host junction $mcpLink -> $mcpSource (exit $LASTEXITCODE)." }

          # Hard-verify UBT will resolve the plugin: the junction must expose UnrealMCP.uplugin.
          $resolved = Join-Path $mcpLink 'UnrealMCP.uplugin'
          if (-not (Test-Path -LiteralPath $resolved)) {
            throw "Host UnrealMCP junction still invalid — $resolved not found after provisioning."
          }
          Write-Host "Host UnrealMCP plugin ready: $mcpLink -> $mcpSource"

      # NOTE: there is deliberately NO standalone `BuildPlugin -Rocket` step. An extension
      # depends on the UnrealMCP plugin, and standalone BuildPlugin builds in an isolated
      # HostProject that CANNOT resolve UnrealMCP unless it is engine-installed into
      # UE_ROOT\Engine\Plugins\Marketplace (see docs/claude/release.md). The per-UE compile
      # validation is the host-editor-target build below, which resolves UnrealMCP via the
      # host project (UNREAL_HOST_PROJECT) — matching the documented design (docs/claude/ci.md:
      # "Build the plugin via UBT against the host project").
      - name: Build host editor target (junction this extension into the host project)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ([string]::IsNullOrWhiteSpace($env:HOST_UPROJECT)) {
            throw "UNREAL_HOST_PROJECT repo variable is not set — needed for the Automation pass."
          }
          $hostPlugins = Join-Path (Split-Path -Parent $env:HOST_UPROJECT) 'Plugins'
          New-Item -ItemType Directory -Force -Path $hostPlugins | Out-Null
          $link = Join-Path $hostPlugins '${{ steps.meta.outputs.module }}'
          if (Test-Path $link) {
            $existing = Get-Item $link -Force
            if ($existing.Attributes -band [IO.FileAttributes]::ReparsePoint) {
              cmd /c rmdir "$link"                 # junction: unlink only (never follows into the target)
            } else {
              Remove-Item $link -Recurse -Force    # leftover real dir (e.g. from the e2e install) — safe: not a reparse point
            }
          }
          # Junction the host's Plugins/<module> -> this checkout's plugin dir so the host editor
          # compiles THIS extension (and its Automation specs) in.
          cmd /c mklink /J "$link" "${{ steps.meta.outputs.plugin_dir }}"
          $hostBuild = Join-Path $env:UE_ROOT 'Engine\Build\BatchFiles\Build.bat'
          $hostTarget = [System.IO.Path]::GetFileNameWithoutExtension($env:HOST_UPROJECT) + 'Editor'
          & $hostBuild $hostTarget Win64 Development -project="$env:HOST_UPROJECT" -WaitMutex
          if ($LASTEXITCODE -ne 0) { throw "Host editor target ($hostTarget) build failed (exit $LASTEXITCODE)" }

      - name: Run Automation specs (filter = module name)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $editorCmd = Join-Path $env:UE_ROOT 'Engine\Binaries\Win64\UnrealEditor-Cmd.exe'
          $reportDir = Join-Path $env:RUNNER_TEMP 'AutomationReport'
          if (Test-Path $reportDir) { Remove-Item $reportDir -Recurse -Force }
          & $editorCmd "$env:HOST_UPROJECT" -nullrhi -nosplash -unattended `
            -ExecCmds="Automation RunTests ${{ steps.meta.outputs.module }}; Quit" `
            -ReportExportPath="$reportDir" -log
          # The editor's exit code is unreliable for test verdicts; the parsed index.json is
          # authoritative. Clear it so pwsh's auto-appended `exit $LASTEXITCODE` does not red
          # the step on an unrelated nonzero editor exit.
          $global:LASTEXITCODE = 0
          echo "REPORT_DIR=$reportDir" >> $env:GITHUB_ENV

      - name: Parse Automation report (index.json is authoritative)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $index = Join-Path $env:REPORT_DIR 'index.json'
          if (-not (Test-Path $index)) {
            throw "Automation index.json is MISSING at $index — the run crashed or produced no report (treat as FAILURE)."
          }
          $report = Get-Content $index -Raw | ConvertFrom-Json
          $failed = [int]$report.failed
          $passed = [int]$report.succeeded + [int]$report.succeededWithWarnings
          Write-Host "Automation results: passed=$passed failed=$failed"
          if ($failed -gt 0) { throw "$failed Automation test(s) failed." }
          if ($passed -lt 1) { throw "No Automation tests succeeded — expected at least one ${{ steps.meta.outputs.module }} spec." }
          Write-Host "All Automation specs passed."

      - name: Upload Automation report on failure
        if: ${{ failure() && env.REPORT_DIR != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: automation-report-ue-${{ inputs.ue }}
          path: ${{ env.REPORT_DIR }}
          if-no-files-found: ignore
          retention-days: 7

      - name: Cleanup this job's build outputs (self-hosted disk hygiene)
        # Self-hosted disk hygiene. This runner is SHARED with other repos' jobs (Unreal-MCP
        # core + the other Unreal-AI-* extensions) and its RUNNER_TEMP + the persistent
        # runner-local host project are NOT auto-pruned after a job, so this job's Automation
        # report and the host's transient logs/crashes accumulate across runs. Remove ONLY
        # THIS job's own regenerable outputs. Deliberately NOT touched:
        #   * host DerivedDataCache / Intermediate / Binaries - a persistent shared-for-speed
        #     cache; deleting it forces a full shader/host recompile every run.
        #   * the host Plugins\<module> junction - re-created by the build step above.
        #   * Docker - these UE jobs use no containers, and the daemon is shared with other
        #     runners' ACTIVE jobs.
        # Best-effort: a cleanup failure must NEVER red an otherwise-green run.
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          function Remove-Tree([string]$p) {
            if ([string]::IsNullOrWhiteSpace($p) -or -not (Test-Path -LiteralPath $p)) { return }
            Write-Host "Removing $p"
            cmd /c rmdir /s /q "$p" 2>$null
            if (Test-Path -LiteralPath $p) { Remove-Item -LiteralPath $p -Recurse -Force -ErrorAction SilentlyContinue }
          }
          # 1. This job's per-run Automation report under RUNNER_TEMP.
          Remove-Tree (Join-Path $env:RUNNER_TEMP 'AutomationReport')
          # 2. This job's UBT logs under RUNNER_TEMP.
          Get-ChildItem -Path $env:RUNNER_TEMP -Filter 'UBT-*.log' -File -ErrorAction SilentlyContinue |
            Remove-Item -Force -ErrorAction SilentlyContinue
          # 3. Host project transient logs/crashes ONLY (unbounded growers; NOT the
          #    DDC / Intermediate / Binaries speed caches).
          if (-not [string]::IsNullOrWhiteSpace($env:HOST_UPROJECT) -and (Test-Path -LiteralPath $env:HOST_UPROJECT)) {
            $hostRoot = Split-Path -Parent $env:HOST_UPROJECT
            foreach ($sub in @('Saved\Logs','Saved\Crashes')) { Remove-Tree (Join-Path $hostRoot $sub) }
          }
          Write-Host "Per-run cleanup done (DDC / Intermediate / Binaries and Docker intentionally preserved)."
